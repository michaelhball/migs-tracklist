name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # The windowing and verifier tests exercise real ffmpeg decoding.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies (incl. verify extra)
        run: uv sync --extra verify

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest -q
